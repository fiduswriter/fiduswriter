name: Release

on:
    push:
        tags:
            - '*'

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

jobs:
    build-deb:
        name: Build Debian Package (${{ matrix.arch }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      runs-on: ubuntu-latest
                    - arch: arm64
                      runs-on: ubuntu-24.04-arm
        runs-on: ${{ matrix.runs-on }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Cache Python build
              uses: actions/cache@v4
              with:
                  path: .python-build-cache
                  key: python-build-${{ matrix.arch }}-${{ hashFiles('debian/rules') }}
                  restore-keys: |
                      python-build-${{ matrix.arch }}-

            - name: Install build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    build-essential debhelper dh-python dh-virtualenv \
                    python3 python3-setuptools python3-babel python3-wheel python3-pip \
                    libssl-dev libffi-dev libbz2-dev libreadline-dev \
                    libsqlite3-dev libncurses-dev libncursesw5-dev \
                    xz-utils tk-dev liblzma-dev libjpeg-dev zlib1g-dev \
                    libmagic1 wget curl devscripts equivs

            - name: Build Debian package
              run: ./build-deb.sh

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: debian-package-${{ matrix.arch }}
                  path: debian-build/*.deb

    build-rpm:
        name: Build RPM Package (${{ matrix.arch }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: x86_64
                      runs-on: ubuntu-latest
                    - arch: aarch64
                      runs-on: ubuntu-24.04-arm
        runs-on: ${{ matrix.runs-on }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Cache Python build
              uses: actions/cache@v4
              with:
                  path: .python-build-cache
                  key: rpm-python-build-${{ matrix.arch }}-${{ hashFiles('rpm/fiduswriter-server.spec') }}
                  restore-keys: |
                      rpm-python-build-${{ matrix.arch }}-

            - name: Build RPM in Rocky Linux container
              run: |
                  docker run --rm \
                    -v $(pwd):/src \
                    -w /src \
                    rockylinux:9 \
                    bash -c "
                      set -e
                      dnf install -y epel-release
                      dnf config-manager --set-enabled crb 2>/dev/null || dnf config-manager --set-enabled powertools 2>/dev/null || true
                      dnf install -y rpm-build gcc make wget \
                        openssl-devel libffi-devel bzip2-devel readline-devel \
                        sqlite-devel ncurses-devel xz-devel tk-devel \
                        zlib-devel libjpeg-turbo-devel mariadb-devel \
                        python3 python3-pip python3-setuptools \
                        systemd-rpm-macros
                      ./build-rpm.sh
                    "

            - name: Fix permissions
              run: sudo chown -R $(id -u):$(id -g) .

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: rpm-package-${{ matrix.arch }}
                  path: rpm-build/*.rpm

    build-pypi:
        name: Build PyPI Package
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.14'

            - name: Install build tools
              run: pip install build

            - name: Build package
              run: python -m build

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: pypi-package
                  path: dist/*

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  password: ${{ secrets.PYPI_API_TOKEN }}

    build-docker:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        needs: []
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Determine version
              id: version
              run: |
                  VERSION=$(tr -d '[:space:]' < fiduswriter/version.txt)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Building version: $VERSION"
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
                  echo "major=$MAJOR" >> $GITHUB_OUTPUT
                  echo "minor=$MINOR" >> $GITHUB_OUTPUT

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: |
                    ghcr.io/${{ github.repository_owner }}/fiduswriter
                  tags: |
                    type=raw,value=latest
                    type=raw,value=${{ steps.version.outputs.version }}
                    type=raw,value=${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
                    type=raw,value=${{ steps.version.outputs.major }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./docker/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                    FIDUSWRITER_VERSION=${{ steps.version.outputs.version }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    update-apt-repo:
        name: Update APT Repository
        needs: release
        # Only update the APT repo for stable releases — skip beta, rc, alpha, dev tags
        # so users with automatic updates don't receive pre-release packages.
        if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'RC') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'dev') }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download amd64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: debian-package-amd64
                  path: debs/

            - name: Download arm64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: debian-package-arm64
                  path: debs/

            - name: Install reprepro
              run: |
                  sudo apt-get update
                  sudo apt-get install -y reprepro

            - name: Clone gh-pages branch
              run: |
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git config --global user.name "github-actions[bot]"
                  if ! git clone --branch gh-pages --single-branch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages-repo 2>/dev/null; then
                    (
                      mkdir -p gh-pages-repo
                      cd gh-pages-repo
                      git init
                      git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
                      git checkout -b gh-pages
                    )
                  fi

            - name: Update APT repository
              run: |
                  mkdir -p gh-pages-repo/apt/conf
                  cat > gh-pages-repo/apt/conf/distributions <<'EOF'
                  Origin: Fidus Writer
                  Label: Fidus Writer
                  Suite: stable
                  Codename: stable
                  Version: 1.0
                  Architectures: amd64 arm64
                  Components: main
                  Description: Fidus Writer APT repository
                  EOF

                  for deb in debs/*.deb; do
                    echo "Adding $deb to APT repository..."
                    reprepro -b gh-pages-repo/apt includedeb stable "$deb"
                  done

                  # Replace relative pool/ paths with absolute GitHub Release asset URLs.
                  # The .deb files themselves are too large (>100MB) to push to gh-pages,
                  # so we keep them as release assets and only store metadata on gh-pages.
                  TAG="${{ github.ref_name }}"
                  REPO="${{ github.repository }}"
                  BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

                  for pkg in gh-pages-repo/apt/dists/stable/main/binary-*/Packages; do
                    [ -f "$pkg" ] || continue
                    echo "Rewriting Filename URLs in $pkg..."
                    awk -v base="$BASE_URL" '
                      /^Filename: pool\// {
                        # Extract the basename from the pool path
                        n = split($0, parts, "/")
                        filename = parts[n]
                        print "Filename: " base "/" filename
                        next
                      }
                      { print }
                    ' "$pkg" > "${pkg}.tmp" && mv "${pkg}.tmp" "$pkg"
                    # Regenerate the compressed version
                    gzip -k -f "$pkg"
                  done

                  # Remove the pool/ directory - .deb files are hosted on GitHub Releases
                  rm -rf gh-pages-repo/apt/pool

                  # Create a simple index page
                  cat > gh-pages-repo/index.html <<'EOF'
                  <!DOCTYPE html>
                  <html>
                  <head><title>Fidus Writer APT Repository</title></head>
                  <body>
                  <h1>Fidus Writer APT Repository</h1>
                  <p>Add this repository to your system:</p>
                  <pre>
                  echo "deb [trusted=yes] https://fiduswriter.github.io/fiduswriter/apt stable main" | sudo tee /etc/apt/sources.list.d/fiduswriter.list
                  sudo apt-get update
                  sudo apt-get install fiduswriter-server
                  </pre>
                  </body>
                  </html>
                  EOF

            - name: Push gh-pages branch
              working-directory: gh-pages-repo
              run: |
                  git add -A
                  if ! git diff --cached --quiet; then
                    git commit -m "Update APT repository for ${{ github.ref_name }}"
                    git push -u origin gh-pages --force
                  fi

    release:
        name: Create Release
        # Note: build-rpm is intentionally excluded from needs so that the
        # release (and APT repo update) is created even when RPM builds fail.
        needs:
            - build-deb
            - build-pypi
            - build-docker
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Determine version
              id: version
              run: |
                  VERSION=$(tr -d '[:space:]' < fiduswriter/version.txt)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Download debian amd64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: debian-package-amd64
                  path: debian-build-amd64/

            - name: Download debian arm64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: debian-package-arm64
                  path: debian-build-arm64/

            - name: Download rpm x86_64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: rpm-package-x86_64
                  path: rpm-build-x86_64/
              continue-on-error: true

            - name: Download rpm aarch64 artifact
              uses: actions/download-artifact@v4
              with:
                  name: rpm-package-aarch64
                  path: rpm-build-aarch64/
              continue-on-error: true

            - name: Download pypi artifact
              uses: actions/download-artifact@v4
              with:
                  name: pypi-package
                  path: pypi-dist/

            - name: Collect release assets
              run: |
                  mkdir -p release-assets
                  cp debian-build-amd64/*.deb release-assets/ 2>/dev/null || true
                  cp debian-build-arm64/*.deb release-assets/ 2>/dev/null || true
                  cp rpm-build-x86_64/*.rpm release-assets/ 2>/dev/null || true
                  cp rpm-build-aarch64/*.rpm release-assets/ 2>/dev/null || true
                  echo "Assets to upload:"
                  ls -la release-assets/

            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  files: release-assets/*
                  body: |
                      ## Fidus Writer ${{ steps.version.outputs.version }}

                      ### Docker Image

                      Multi-architecture Docker images (amd64, arm64) are available:

                      ```bash
                      docker pull ghcr.io/fiduswriter/fiduswriter:${{ steps.version.outputs.version }}
                      docker pull ghcr.io/fiduswriter/fiduswriter:latest
                      ```

                      ### PyPI

                      Install with pip:

                      ```bash
                      pip install fiduswriter==${{ steps.version.outputs.version }}
                      ```

                      ### APT Repository (Debian/Ubuntu/Linux Mint)

                      Add the repository and install:

                      ```bash
                      echo "deb [trusted=yes] https://fiduswriter.github.io/fiduswriter/apt stable main" | sudo tee /etc/apt/sources.list.d/fiduswriter.list
                      sudo apt-get update
                      sudo apt-get install fiduswriter-server
                      ```

                      ### RPM Packages

                      Download and install the RPM for your architecture from the assets below.

                      ### System Packages

                      - **Debian/Ubuntu**: `fiduswriter-server_*_amd64.deb` or `fiduswriter-server_*_arm64.deb`
                      - **RHEL/Rocky/AlmaLinux/Fedora**: `fiduswriter-server-*_x86_64.rpm` or `fiduswriter-server-*_aarch64.rpm`
